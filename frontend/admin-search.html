<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>검색 로그 관리자 | 병원비 계산기</title>
    <link rel="stylesheet" href="assets/css/seo-page.css">
    <style>
        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 18px;
            margin-top: 24px;
        }

        .admin-card {
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 18px;
            background: #f8fafc;
        }

        .admin-form {
            display: grid;
            gap: 12px;
            margin-top: 18px;
        }

        .admin-form input,
        .admin-form select {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            font-size: 14px;
        }

        th,
        td {
            padding: 10px;
            border-bottom: 1px solid #e5e7eb;
            text-align: left;
        }

        th {
            color: #334155;
        }

        .error {
            color: #b91c1c;
            margin-top: 12px;
        }
        .btn-delete {
            background: #ef4444;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-delete:hover {
            background: #dc2626;
        }
        .admin-danger-zone {
            margin-top: 14px;
            padding: 14px;
            border: 1px solid #fecaca;
            border-radius: 10px;
            background: #fff1f2;
        }
        .admin-danger-zone p {
            margin: 0 0 10px;
            color: #991b1b;
            font-size: 13px;
        }
        .btn-delete-all {
            background: #991b1b;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn-delete-all:hover {
            background: #7f1d1d;
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="panel">
            <h1>검색 로그 관리자</h1>
            <p>많이 검색된 키워드, 결과 없는 검색어, 많이 클릭된 항목을 확인합니다. 이 페이지는 검색엔진에 노출하지 않도록 설정되어 있습니다.</p>

            <div class="admin-form">
                <select id="days">
                    <option value="7">최근 7일</option>
                    <option value="30" selected>최근 30일</option>
                    <option value="90">최근 90일</option>
                    <option value="365">최근 365일</option>
                </select>
                <button class="cta" type="button" onclick="loadStats()">통계 불러오기</button>
            </div>

            <div class="admin-danger-zone">
                <p>전체 삭제는 검색 로그, 검색 클릭 로그, 계산 조건 로그를 모두 삭제합니다. 복구할 수 없습니다.</p>
                <button class="btn-delete-all" type="button" onclick="deleteAllLogs()">전체 로그 삭제</button>
            </div>

            <p id="status" class="error"></p>

            <div class="admin-grid">
                <section class="admin-card">
                    <h2>많이 검색된 키워드</h2>
                    <table>
                        <thead>
                            <tr><th>검색어</th><th>횟수</th><th>평균 결과</th><th>기능</th></tr>
                        </thead>
                        <tbody id="top-searches"></tbody>
                    </table>
                </section>

                <section class="admin-card">
                    <h2>결과 없는 검색어</h2>
                    <table>
                        <thead>
                            <tr><th>검색어</th><th>횟수</th><th>기능</th></tr>
                        </thead>
                        <tbody id="zero-searches"></tbody>
                    </table>
                </section>

                <section class="admin-card">
                    <h2>많이 클릭된 항목</h2>
                    <table>
                        <thead>
                            <tr><th>항목</th><th>클릭</th><th>기능</th></tr>
                        </thead>
                        <tbody id="clicked-items"></tbody>
                    </table>
                </section>

                <section class="admin-card">
                    <h2>최근 검색</h2>
                    <table>
                        <thead>
                            <tr><th>검색어</th><th>결과</th><th>기기</th><th>시간</th><th>기능</th></tr>
                        </thead>
                        <tbody id="recent-searches"></tbody>
                    </table>
                </section>

                <section class="admin-card">
                    <h2>계산 조건 로그</h2>
                    <table>
                        <thead>
                            <tr><th>병원</th><th>진료</th><th>지역</th><th>횟수</th><th>기능</th></tr>
                        </thead>
                        <tbody id="calculation-conditions"></tbody>
                    </table>
                </section>
            </div>
        </section>
    </main>

    <script>
        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function renderRows(targetId, rows, renderer, emptyColspan) {
            const target = document.getElementById(targetId);
            if (!rows || rows.length === 0) {
                target.innerHTML = `<tr><td colspan="${emptyColspan}">데이터 없음</td></tr>`;
                return;
            }

            target.innerHTML = rows.map(renderer).join('');
        }

        function getDeviceLabel(userAgent) {
            const ua = String(userAgent || '').toLowerCase();
            if (!ua) return '알 수 없음';
            const browser = ua.includes('edg/') ? 'Edge'
                : ua.includes('chrome/') ? 'Chrome'
                : ua.includes('safari/') && !ua.includes('chrome/') ? 'Safari'
                : ua.includes('firefox/') ? 'Firefox'
                : '브라우저';
            const device = /iphone|ipad|ipod/.test(ua) ? 'iOS'
                : ua.includes('android') ? 'Android'
                : ua.includes('windows') ? 'Windows'
                : ua.includes('mac os') ? 'Mac'
                : '기기';
            return `${device} / ${browser}`;
        }

        async function loadStats() {
            const days = document.getElementById('days').value;
            const status = document.getElementById('status');
            status.textContent = '';

            try {
                const response = await fetch(`/api/admin/search-stats?days=${encodeURIComponent(days)}`);

                const data = await response.json();
                if (!response.ok || !data.ok) {
                    throw new Error(data.error || '통계 조회 실패');
                }

                renderRows('top-searches', data.topSearches, row => `
                    <tr>
                        <td>${escapeHtml(row.normalized_query)}</td>
                        <td>${escapeHtml(row.search_count)}</td>
                        <td>${Math.round(Number(row.avg_result_count || 0))}</td>
                        <td><button class="btn-delete" type="button" onclick="deleteLog('top-search', '${escapeHtml(row.normalized_query)}')">삭제</button></td>
                    </tr>
                `, 4);

                renderRows('zero-searches', data.zeroResultSearches, row => `
                    <tr>
                        <td>${escapeHtml(row.normalized_query)}</td>
                        <td>${escapeHtml(row.zero_result_count)}</td>
                        <td><button class="btn-delete" type="button" onclick="deleteLog('zero-search', '${escapeHtml(row.normalized_query)}')">삭제</button></td>
                    </tr>
                `, 3);

                renderRows('clicked-items', data.clickedItems, row => `
                    <tr>
                        <td>${escapeHtml(row.clicked_item_name)}</td>
                        <td>${escapeHtml(row.click_count)}</td>
                        <td><button class="btn-delete" type="button" onclick="deleteLog('click-log', '${escapeHtml(row.clicked_item_name)}')">삭제</button></td>
                    </tr>
                `, 3);

                renderRows('recent-searches', data.recentSearches, row => `
                    <tr>
                        <td>${escapeHtml(row.query)}</td>
                        <td>${escapeHtml(row.result_count)}</td>
                        <td title="${escapeHtml(row.user_agent)}">${escapeHtml(getDeviceLabel(row.user_agent))}</td>
                        <td>${escapeHtml(row.created_at)}</td>
                        <td><button class="btn-delete" type="button" onclick="deleteLog('recent-search', '${escapeHtml(row.id)}')">삭제</button></td>
                    </tr>
                `, 5);

                renderRows('calculation-conditions', data.calculationConditions, row => `
                    <tr>
                        <td>${escapeHtml(row.hospital_class)}</td>
                        <td>${escapeHtml(row.treatment_type)}</td>
                        <td>${escapeHtml(row.nonbenefit_region)}</td>
                        <td>${escapeHtml(row.calculation_count)}</td>
                        <td><button class="btn-delete" type="button" onclick="deleteLog('calc-log', '', { hospitalClass: '${escapeHtml(row.hospital_class)}', treatmentType: '${escapeHtml(row.treatment_type)}', nonbenefitRegion: '${escapeHtml(row.nonbenefit_region)}' })">삭제</button></td>
                    </tr>
                `, 5);
            } catch (error) {
                status.textContent = error.message;
            }
        }

        async function deleteLog(type, value, extra = {}) {
            if (!confirm('정말 삭제하시겠습니까? 관련 로그가 모두 삭제됩니다.')) return;
            try {
                const response = await fetch('/api/admin/delete-log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        type,
                        value,
                        hospitalClass: extra.hospitalClass,
                        treatmentType: extra.treatmentType,
                        nonbenefitRegion: extra.nonbenefitRegion
                    })
                });

                const data = await response.json();
                if (!response.ok || !data.ok) {
                    throw new Error(data.error || '삭제 처리 실패');
                }
                alert('정상적으로 삭제되었습니다.');
                await loadStats();
            } catch (error) {
                alert('에러: ' + error.message);
            }
        }

        async function deleteAllLogs() {
            const firstConfirm = confirm('전체 로그를 삭제합니다. 검색 로그, 클릭 로그, 계산 조건 로그가 모두 삭제됩니다. 계속할까요?');
            if (!firstConfirm) return;
            const finalConfirm = confirm('복구할 수 없습니다. 정말 전체 삭제할까요?');
            if (!finalConfirm) return;

            try {
                const response = await fetch('/api/admin/delete-log', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type: 'all' })
                });

                const data = await response.json();
                if (!response.ok || !data.ok) {
                    throw new Error(data.error || '전체 삭제 처리 실패');
                }
                alert('전체 로그를 삭제했습니다.');
                await loadStats();
            } catch (error) {
                alert('에러: ' + error.message);
            }
        }
    </script>
</body>
</html>
