    <script>
        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            }[char]));
        }

        function renderRows(targetId, rows, renderer, emptyColspan) {
            const target = document.getElementById(targetId);
            if (!rows || rows.length === 0) {
                target.innerHTML = `<tr><td colspan="${emptyColspan}">?жҖЁмҖ¬лө ????кіёлІү</td></tr>`;
                return;
            }

            target.innerHTML = rows.map(renderer).join('');
        }

        function getDeviceLabel(userAgent) {
            const ua = String(userAgent || '').toLowerCase();
            if (!ua) return '??????кіёлІү';
            const browser = ua.includes('edg/') ? 'Edge'
                : ua.includes('chrome/') ? 'Chrome'
                : ua.includes('safari/') && !ua.includes('chrome/') ? 'Safari'
                : ua.includes('firefox/') ? 'Firefox'
                : '?лҗ°мҠў??жҖЁ?';
            const device = /iphone|ipad|ipod/.test(ua) ? 'iOS'
                : ua.includes('android') ? 'Android'
                : ua.includes('windows') ? 'Windows'
                : ua.includes('mac os') ? 'Mac'
                : 'з–«кҝёнҖ—з”ұ?;
            return `${device} / ${browser}`;
        }

        async function loadStats() {
            const days = document.getElementById('days').value;

            status.textContent = '';

            try {
                const response = await fetch(`/api/admin/search-stats?days=${encodeURIComponent(days)}`);

                }

                renderRows('top-searches', data.topSearches, row => `
                    <tr>
                        <td>${escapeHtml(row.normalized_query)}</td>
                        <td>${escapeHtml(row.search_count)}</td>
                        <td>${Math.round(Number(row.avg_result_count || 0))}</td>
                        <td><button class="btn-delete" type="button" onclick="deleteLog('top-search', '${escapeHtml(row.normalized_query)}')">????/button></td>
